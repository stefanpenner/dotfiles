name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  zsh:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          brew install fzf fd bat bat-extras lsd direnv \
            zsh-autosuggestions zsh-fast-syntax-highlighting zsh-history-substring-search

      - name: Install powerlevel10k
        run: |
          git clone --depth=1 https://github.com/romkatv/powerlevel10k.git \
            "$HOME/.config/zsh/plugins/powerlevel10k"

      - name: Run zsh tests
        run: bash .config/zsh/test.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check shell scripts
        run: |
          shellcheck sync.sh bootstrap.sh
